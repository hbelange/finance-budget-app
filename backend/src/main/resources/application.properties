spring.application.name=financebudgetapp

# Datasource
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/budget}
spring.datasource.username=${DB_USERNAME:budget}
spring.datasource.password=${DB_PASSWORD:budget}

# JPA
spring.jpa.hibernate.ddl-auto=validate

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Auth0
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://dev-pbo6b7xkaou1ofah.us.auth0.com/
spring.security.oauth2.resourceserver.jwt.audiences=https://finance-budget-api
